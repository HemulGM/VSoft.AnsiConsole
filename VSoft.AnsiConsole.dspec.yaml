min client version: 1.0
metadata:
  id: VSoft.AnsiConsole
  version: 0.1.0
  description: Advanced console library
  authors: [ Vincent Parrett ]
  projectUrl: https://github.com/VSoftTechnologies/VSoft.AnsiConsole
  repositoryUrl: https://github.com/VSoftTechnologies/VSoft.AnsiConsole
  license: MIT
  copyright: Vincent Parrett and contributors
  tags:
    - console
    - terminal
    - ansi

variables:
  packageSource: "RAD Studio $compilernoprefix$"

targetPlatforms:
  - compiler from: delphixe3
    compiler to: delphi10.4
    platforms: [ win32, win64 ]
  - compiler from: delphi11
    compiler to: delphi13
    platforms: [ win32, win64 ]
    variables:
      packageSource: "RAD Studio $compilernoprefix$.0"

templates:
  - name: default
    dependencies:
      - id: VSoft.System.Console
        version: 1.2.0
    source:
      - src: ./LICENSE
      - src: ./source/**.pas
      - src: ./Packages/$packageSource$/*.dpk
      - src: ./Packages/$packageSource$/*.dproj
    build:
      - project: ./Packages/$packageSource$/VSoft.AnsiConsoleR.dproj
        platforms: [ win32, win64 ]
